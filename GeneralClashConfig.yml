#---------------------------------------------------#
# OpenClash 配置模板
# fake-ip 模式，国内DNS加速，海外fallback
#---------------------------------------------------#

mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true

external-controller: '0.0.0.0:9090'
secret: ""

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  fake-ip-filter:
    - '*.lan'
    - '*.local'

  # 仅用于启动时解析DoH/DoT服务器域名
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 主DNS：国内加密DNS，速度快
  # fake-ip模式下DNS结果不对外暴露，不存在泄露问题
  nameserver:
    - 'https://doh.pub/dns-query'
    - 'https://dns.alidns.com/dns-query'
    - 'tls://dot.pub:853'
    - 'tls://dns.alidns.com:853'

  # fallback：海外DNS，非CN IP时触发
  fallback:
    - 'https://1.1.1.1/dns-query'
    - 'https://8.8.8.8/dns-query'
    - 'tls://1.1.1.1:853'
    - 'tls://8.8.4.4:853'

  # 解析到非中国IP时走fallback
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/8
    domain: []

experimental:
  ignore-resolve-fail: true
  sniff-tls-sni: true
  sniff-http-host: true

proxies: []
proxy-groups: []
rules: []
