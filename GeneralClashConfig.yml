mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: silent
ipv6: false
unified-delay: true
tcp-concurrent: true
udp: true
external-controller: '127.0.0.1:9090'
secret: ""

profile:
  store-selected: true
  store-fake-ip: true
  update-interval: 0

# TUN 已移除 —— OpenClash 用 iptables 劫持流量，开 TUN 会冲突

dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - 'localhost.ptlogin2.qq.com'
    - '+.stun.*.*'
    - '+.stun.*.*.*'
    - '+.stun.*.*.*.*'
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - 'https://doh.pub/dns-query'
    - 'https://dns.alidns.com/dns-query'
    - 'tls://dot.pub:853'
    - 'tls://dns.alidns.com:853'
  fallback:
    - 'https://1.1.1.1/dns-query'
    - 'https://8.8.8.8/dns-query'
    - 'tls://1.1.1.1:853'
    - 'tls://8.8.4.4:853'
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/8
    domain: []

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080, 8880, 2052, 2082, 2086, 2095]
      override-destination: true
    TLS:
      ports: [443, 8443, 2053, 2083, 2087, 2096]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - '+.push.apple.com'
    - '+.apple.com'
    - 'Mijia Cloud'

experimental:
  ignore-resolve-fail: true

proxies: []
proxy-groups: []
rules: []
